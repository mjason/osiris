name: Publish Python package

on:
  push:
    tags:
      - "v*"
      - "!vscode-v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing vX.Y.Z tag to publish
        required: true
        type: string

env:
  RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}

permissions:
  contents: read

jobs:
  version:
    name: Verify release version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Match tag to Cargo version
        shell: bash
        run: |
          version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)"
          test "v${version}" = "${RELEASE_TAG}"

  test:
    name: Test release source
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --all-targets --all-features

  wheels:
    name: Wheel (${{ matrix.os }}, ${{ matrix.target }})
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: windows-latest
            target: x64
          - os: macos-13
            target: x86_64
          - os: macos-14
            target: aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: python-wheel-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  sdist:
    name: Source distribution
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish osiris-lang to PyPI
    needs:
      - test
      - wheels
      - sdist
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/osiris-lang/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: python-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
